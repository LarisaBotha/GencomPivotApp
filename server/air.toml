root = "."
test_decode_file = true
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/main.exe ."
  
  bin = "tmp/main.exe"
  
  full_bin = ".\\tmp\\main.exe"

  include_ext = ["go", "tpl", "tmpl", "html"]
  exclude_dir = ["tmp", "node_modules", "public", "view"]
  delay = 1000
  stop_on_error = true

[log]
  time = true

[screen]
  clear_on_rebuild = true