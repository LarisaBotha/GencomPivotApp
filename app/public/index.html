<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/app.css">
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script>
      //const API_URL = window.location.hostname === "localhost" ? "http://localhost:8080" : "https://pivot-api-of3d.onrender.com";
      const API_URL = "https://pivot-api-of3d.onrender.com";
    </script>
  </head>

  <body class="w-full h-full overflow-y-auto" 
      x-data="{
        _user_id: localStorage.getItem('last_user_id'),
        get user_id() { return this._user_id; },
        set user_id(id) {
          this._user_id = id;
          localStorage.setItem('last_user_id', id);
        },
        get currentView() { return this._user_id ? 'main' : 'login'; },
        viewContent: '',
        
        async loadPage(pageName) {
          try {
            const response = await fetch(`./pages/${pageName}.html`);
            this.viewContent = await response.text();
            this.currentView = pageName;

            this.$nextTick(() => {
                Alpine.initTree(document.getElementById('content'));
            });
          } catch (err) {
            console.error('Failed to load page:', err);
          }
        }
      }" 
      x-init="loadPage(currentView)"> 
    <div id="content" class="w-full h-screen" x-html="viewContent"></div>

    <script src="components/components.js"></script>
  </body>
</html>
