<div 
  x-data="{
    editSection: {},
    get startAngleIndex() {
        if (activeIndex === null) return null;
        return sectionData.length === 1 ? null : (activeIndex === 0 ? sectionData.length - 1 : activeIndex - 1);
    }
  }"
  x-show="bShow"
  x-cloak 
  class="fixed inset-0 z-50 flex items-center justify-center bg-black/50"
  x-init="$watch('bShow', value => {
      if (value && activeIndex !== null) {
          editSection = {
              serial: sectionData[activeIndex].serial,
              label: sectionData[activeIndex].label || '', 
              startAngle: startAngleIndex !== null ? sectionData[startAngleIndex].angle_deg : 0,
              angle_deg: sectionData[activeIndex].angle_deg,
              timer_pct: sectionData[activeIndex].timer_pct
          };
      }
  })"
>
  <div @click.away="bShow = false" class="max-w-[80%] bg-white p-6 rounded-lg shadow-xl w-96 text-gray-800">
    <h2 class="text-xl font-bold mb-4">Edit Section</h2>
    
    <div class="space-y-4">
      <div>
        <label class="block text-sm font-semibold">Section Name</label>
        <input type="text" x-model="editSection.label" class="w-full border rounded px-2 py-1">
      </div>

      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-semibold">Start Angle</label>
          <div class="flex items-center w-full border rounded px-2 py-1 focus-within:ring-1 focus-within:ring-blue-500">
                <input 
                    type="number"
                    :readonly="sectionData.length == 1"
                    x-model.number="editSection.startAngle"
                    class="w-full outline-none appearance-none"
                >
                <span class="text-gray-400 select-none ml-1">°</span>
            </div>
        </div>
        <div>
            <label class="block text-sm font-semibold">End Angle</label>
            <div class="flex items-center w-full border rounded px-2 py-1 focus-within:ring-1 focus-within:ring-blue-500">
                <input 
                    type="number" 
                    x-model.number="editSection.angle_deg"
                    class="w-full outline-none appearance-none"
                >
                <span class="text-gray-400 select-none ml-1">°</span>
            </div>
        </div>
      </div>

      <div>
        <label class="block text-sm font-semibold">Timer Speed</label>
        <div class="flex items-center w-full border rounded px-2 py-1 focus-within:ring-1 focus-within:ring-blue-500">
            <input 
                type="number" 
                x-model.number="editSection.timer_pct" 
                class="w-full outline-none appearance-none"
            >
            <span class="text-gray-400 select-none ml-1">%</span>
        </div>
      </div>
    </div>

    <div class="mt-6 flex justify-between">
      <button @click="bShow = false" class="px-4 py-2 text-gray-600">Cancel</button>
      <button 
        @click="() => {
            if (sectionData[activeIndex].label != editSection.label || 
                sectionData[activeIndex].angle_deg != editSection.endAngle || 
                sectionData[activeIndex].timer_pct != editSection.timer) {
                
                window.dispatchEvent(new CustomEvent('on-edit', { 
                    detail: { 
                        section: editSection, 
                        onSuccess: () => { bShow = false; } 
                    }
                }));
            }
            if (startAngleIndex !== null && sectionData[startAngleIndex].angle_deg != editSection.startAngle) {
                window.dispatchEvent(new CustomEvent('on-edit', { 
                    detail: { 
                        section: { serial: sectionData[startAngleIndex].serial, angle_deg: editSection.startAngle }, 
                        onSuccess: () => { bShow = false; } 
                    }
                })); 
            }
        }"
        class="px-4 py-2 bg-green-500 text-white rounded font-bold"
      >
        Save Changes
      </button>
    </div>
  </div>
</div>
